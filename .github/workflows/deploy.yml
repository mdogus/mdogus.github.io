name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"

      - name: Sync publications from Zotero
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ZOTERO_API_KEY)) {
            Write-Host "ZOTERO_API_KEY is not set; skipping Zotero sync."
            exit 0
          }

          ./scripts/sync-zotero-publications.ps1 -ApiKey "$env:ZOTERO_API_KEY"

      - name: Build site
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
