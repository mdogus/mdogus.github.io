{{- $all := slice -}}
{{- $sources := slice (index site.Data "pub-articles") (index site.Data "pub-books") (index site.Data "pub-conferences") (index site.Data "pub-theses") -}}
{{- range $sources -}}
  {{- range . -}}
    {{- $all = $all | append . -}}
  {{- end -}}
{{- end -}}
<script>
window.__PUBLICATIONS_DATA__ = {{ $all | jsonify | safeJS }};
window.__FEATURED_PUBLICATIONS_DATA__ = {{ (index site.Data "featured-publications") | jsonify | safeJS }};
</script>
