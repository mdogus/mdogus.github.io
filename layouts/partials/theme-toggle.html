<button
  class="theme-toggle"
  type="button"
  aria-label="{{ i18n "theme_toggle" }}"
  aria-pressed="false"
  data-theme-toggle
  data-theme-label-light="{{ i18n "theme_current_light" }}"
  data-theme-label-dark="{{ i18n "theme_current_dark" }}"
  data-theme-action-light="{{ i18n "theme_switch_to_light" }}"
  data-theme-action-dark="{{ i18n "theme_switch_to_dark" }}">
  <svg class="theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" fill="currentColor"/>
  </svg>
  <svg class="theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <circle cx="12" cy="12" r="4.5" fill="currentColor"/>
    <path d="M12 1.5v2.5M12 20v2.5M4.22 4.22l1.77 1.77M18.01 18.01l1.77 1.77M1.5 12H4M20 12h2.5M4.22 19.78l1.77-1.77M18.01 5.99l1.77-1.77" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
  </svg>
</button>
