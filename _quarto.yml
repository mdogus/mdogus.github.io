project:
  type: website
  output-dir: _site
  resources:
    - assets/

website:
  title: "Ad Soyad"
  description: "Akademik içeriklerini düşük bakım maliyetiyle yöneten kişisel web sitesi."
  site-url: "https://mdogus.github.io/"
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: textbox
  navbar:
    pinned: true
    collapse-below: lg
    background: "#f8f3ec"
    foreground: "#24313d"
    right:
      - href: index.qmd
        text: Ana Sayfa
      - href: bio.qmd
        text: Bio
      - href: publications.qmd
        text: Yayınlar
      - href: contact.qmd
        text: İletişim

lang: tr

format:
  html:
    theme:
      light:
        - litera
        - styles.scss
    toc: false
    anchor-sections: false
    page-layout: article
    grid:
      body-width: 1120px
      margin-width: 0px
      sidebar-width: 0px
    include-before-body:
      - includes/skip-link.html
    include-in-header:
      - includes/head-meta.html
    include-after-body:
      - includes/site-footer.html
